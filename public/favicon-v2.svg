<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="blueGradH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38B6FF"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080E22"/>
      <stop offset="100%" stop-color="#050914"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38B6FF"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#darkGrad)"/>

  <!-- Glowing border -->
  <rect x="6" y="6" width="500" height="500" rx="92" fill="none" stroke="url(#borderGrad)" stroke-width="6"/>

  <!-- Top accent bar -->
  <rect x="78" y="56" width="356" height="22" rx="11" fill="url(#blueGradH)" opacity="0.85"/>

  <!-- N lettermark -->
  <!-- Left vertical stroke -->
  <rect x="78" y="120" width="76" height="272" rx="20" fill="white"/>
  <!-- Right vertical stroke -->
  <rect x="358" y="120" width="76" height="272" rx="20" fill="white"/>
  <!-- Diagonal stroke -->
  <polygon points="154,120 226,120 434,392 362,392" fill="url(#blueGradH)"/>

  <!-- Bottom accent line -->
  <rect x="118" y="430" width="276" height="8" rx="4" fill="url(#blueGradH)" opacity="0.6"/>
</svg>
